<!doctype html>
<html lang="en">

<head>
    <!--#include virtual="/head.html" -->
    <meta name="description" content="Select a geoword division.">
</head>

<body>
    <!--#include virtual="/nav/index.html" -->

    <div class="container-xl mt-3 mb-5 pb-5">
        <p>
            Choose your division for packet <b id="packet-name"></b>.
            <i>You cannot change your division once you have submitted a response.</i>
        </p>
        <div>
            <p>
                "Division 1" corresponds to <a href="https://www.naqt.com/college/division-i.html">ICT D1</a>,
                and "Division 2" corresponds to <a href="https://www.naqt.com/college/division-ii.html">ICT D2</a>.
                <i>Some packets, such as the samples, may have only 1 division.</i>
            </p>
            <form id="form">
                <div class="row mb-3">
                    <div class="col-6">
                        <select class="form-select" id="division"></select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="submit">Submit</button>
            </form>
        </div>
    </div>

    <script type="module" src="./index.js"></script>
</body>

</html>
