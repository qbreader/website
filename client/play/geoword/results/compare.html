<!doctype html>
<html lang="en">

<head>
    <!--#include virtual="/head.html" -->
    <meta name="description" content="Compare geoword results against another player.">
</head>

<body>
    <!--#include virtual="/nav/index.html" -->

    <div class="container-xl mt-3 mb-5 pb-5">
        <p>
            Compare your stats on <b id="packet-name"></b> (<span id="division"></span>) against another player.
        </p>
        <form class="mb-3" id="form">
            <div class="mb-3">
                <label for="opponent" class="form-label">Enter a username here:</label>

            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
        <div id="root"></div>
    </div>

    <script type="module" src="./compare.js"></script>
</body>

</html>
