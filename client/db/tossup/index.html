<!doctype html>
<html lang="en">

<head>
    <title>QB Reader</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">

    <link href="/apple-touch-icon.png" rel="apple-touch-icon">
    <link href="/apple-touch-icon-precomposed.png" rel="apple-touch-icon-precomposed">
    <link type="image/x-icon" href="/favicon.ico" rel="icon">

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link href="/style.css" rel="stylesheet">
    <script src="/scripts/global.js"></script>
</head>

<body>
    <!--#include virtual="/nav/index.html" -->

    <div class="container-xl mt-3 mb-5 pb-5">
        <div class="d-flex justify-content-between mb-3">
            <div>
                <div>
                    <b>Packet:</b> <a id="packet-link"><span id="packet-number" href="">1</span> (<span id="packet-name"></span>)</a>
                </div>
                <div><b>Set:</b> <a id="set-name"></a></div>
            </div>
            <a href="../set-list/">Back to all sets</a>
        </div>
        <hr>
        <div id="tossup"></div>
        <div class="d-block mx-auto mt-3 spinner-border" id="spinner" role="status"><span class='d-none'>Loading...</span></div>
        <hr>
        <div id="metadata">
            <b>Question ID:</b> <span id="_id"></span><br>
            <b>Difficulty:</b> <span id="difficulty"></span><br>
            <b>Standard:</b> <span id="standard"></span><br>
            <b>Date Created:</b> <span id="time-created"></span><br>
            <b>Last Modified:</b> <span id="last-modified"></span><br>
        </div>
        <hr>
        <p><b>Question Stats:</b></p>
        <div class="d-none" id="question-stats">
            <b>TUH:</b> <span id="tuh"></span><br>
            <div id="result-counts"></div>
            <b>Average celerity:</b> <span id="average-celerity"></span><br>
            <b>Total points:</b> <span id="total-points"></span><br>
            <b>PPTU:</b> <span id="pptu"></span>
        </div>
    </div>

    <script type="module" src="./index.js"></script>
</body>

</html>
