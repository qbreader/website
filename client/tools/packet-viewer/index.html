<!doctype html>
<html lang="en">

<head>
    <title>QB Reader</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="The packet parser that powers QB Reader.">

    <link href="/apple-touch-icon.png" rel="apple-touch-icon">
    <link href="/apple-touch-icon-precomposed.png" rel="apple-touch-icon-precomposed">
    <link type="image/x-icon" href="/favicon.ico" rel="icon">

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link href="/style.css" rel="stylesheet">
    <script src="/scripts/global.js"></script>
</head>

<body>
    <!--#include virtual="/nav/index.html" -->

    <div class="container mt-3">
        <p>
            This tool takes a packet that was parsed using the <a href="/tools/packet-parser/">QBReader parser</a> (in any mode) or
            <a href="https://quizbowlreader.com/yapp.html">YAPP</a> and displays it for viewing.
        </p>
        <label for="file-input" class="form-label">Select a <code>.json</code> file to view:</label>
        <input class="form-control mb-2" type="file" id="file-input" accept="application/json,.json">
        <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="pg-gray" checked>
            <label class="form-check-label" for="pg-gray">Gray out pronunciation guides</label>
        </div>
        <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="pg-highlight">
            <label class="form-check-label" for="pg-highlight">Highlight pronunciation guides</label>
        </div>
        <hr>
        <div class="mb-3" id="file-output"></div>
    </div>

    <script type="module" src="./index.js"></script>
</body>

</html>
