<!doctype html>
<html lang="en">

<head>
    <title>QB Reader</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="The packet parser that powers QB Reader.">

    <link href="/apple-touch-icon.png" rel="apple-touch-icon">
    <link href="/apple-touch-icon-precomposed.png" rel="apple-touch-icon-precomposed">
    <link type="image/x-icon" href="/favicon.ico" rel="icon">

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link href="/style.css" rel="stylesheet">
    <script src="/scripts/global.js"></script>
</head>

<body>
    <!--#include virtual="/nav/index.html" -->

    <div class="container mt-3">
        <p>
            Note: All parsing is done <a href="https://github.com/qbreader/qb-packet-parser">client-side</a>; packets are never sent to
            the QBReader server.
        </p>
        <form class="mb-3" id="form">
            <div class="mb-3">
                <label for="file-input" class="form-label">
                    Select one or more <code>.docx</code> files to parse (select multiple files at once by holding down Shift or
                    Control and clicking):
                </label>
                <input class="form-control" type="file" id="file-input"
                    accept=".doc,.docx,.xml,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
                    multiple>
            </div>
            <div class="mb-3">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" role="switch" id="has-question-numbers" checked>
                    <label class="form-check-label" for="has-question-numbers">Has question numbers</label>
                </div>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" role="switch" id="has-category-tags" checked>
                    <label class="form-check-label" for="has-category-tags">Has category tags</label>
                </div>
                <hr>
                Output format (choose QB Reader if you're trying to play a packet on this website):
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="format" id="buzzpoint-format">
                    <label class="form-check-label" for="buzzpoint-format">Buzzpoint</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="format" id="modaq-format" checked>
                    <label class="form-check-label" for="modaq-format">MODAQ</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="format" id="qbreader-format">
                    <label class="form-check-label" for="qbreader-format">QB Reader</label>
                </div>
            </div>
            <div>
                <button type="submit" class="btn btn-primary">Submit</button>
                <button type="button" class="btn btn-success d-none" id="download-all">Download All</button>
            </div>
        </form>
        <ul class="list-group mb-3" id="file-output"></ul>
        <div class="d-none" id="warnings">
            <h4>Warnings</h4>
            <ul class="list-group" id="warning-list"></ul>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script type="module" src="./index.js"></script>
</body>

</html>
