<!doctype html>
<html lang="en">

<head>
    <title>QBReader - User - Login</title>
    <!--#include virtual="/ssi/head.html" -->
    <meta name="description" content="">
</head>

<body>
    <!--#include virtual="/ssi/nav.html" -->

    <div class="container-xl mt-3 mb-5 pb-5">
        <p class="mt-1 lead">
            Don't have an account?
            Sign up <a href="/user/signup">here</a>.
        </p>
        <form class="needs-validation" id="login-form" novalidate>
            <div class="col-12 mb-3">
                <label class="form-label" for="username">Username</label>
                <input class="form-control" id="username" type="text" name="username" required>
                <div class="invalid-feedback">Enter your username.</div>
            </div>
            <div class="col-12 mb-3">
                <label class="form-label" for="password">Password</label>
                <div class="input-group">
                    <input class="form-control" id="password" type="password" name="password" required>
                    <button class="btn btn-outline-secondary" id="toggle-password" type="button" aria-label="Show password">
                        <i class="bi bi-eye"></i>
                    </button>
                    <div class="invalid-feedback">Enter your password.</div>
                </div>
                <div class="form-text" id="passwordHelp">Forgot your password? <a href="/user/forgot-password">Click here</a>.</div>
            </div>
            <button class="btn btn-primary" id="submission" type="submit">
                Log in
            </button>
        </form>
    </div>



    <script type="module" src="/user/login.js"></script>
</body>

</html>
