<!doctype html>
<html lang="en">

<head>
    <title>QB Reader</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">

    <link href="/apple-touch-icon.png" rel="apple-touch-icon">
    <link href="/apple-touch-icon-precomposed.png" rel="apple-touch-icon-precomposed">
    <link type="image/x-icon" href="/favicon.ico" rel="icon">

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link href="/style.css" rel="stylesheet">
    <script src="/scripts/global.js"></script>
</head>

<body>
    <!--#include virtual="/nav/index.html" -->

    <div class="container-xl mt-3 mb-5 pb-5">
        <p class="mt-1 lead">
            Don't have an account?
            Sign up <a href="/user/signup">here</a>.
        </p>
        <form class="needs-validation" id="login-form" novalidate>
            <div class="col-12 mb-3">
                <label class="form-label" for="username">Username</label>
                <input class="form-control" id="username" type="text" name="username" required>
                <div class="invalid-feedback">Enter your username.</div>
            </div>
            <div class="col-12 mb-3">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" id="password" type="password" name="password" required>
                <div class="invalid-feedback">Enter your password.</div>
                <div class="form-text" id="passwordHelp">Forgot your password? <a href="/user/forgot-password">Click here</a>.</div>
            </div>
            <button class="btn btn-primary" id="submission" type="submit">
                Log in
            </button>
        </form>
    </div>



    <script type="module" src="/user/login.js"></script>
</body>

</html>
