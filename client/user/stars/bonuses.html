<!doctype html>
<html lang="en">

<head>
    <title>QB Reader</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="View your starred bonuses.">

    <link href="/apple-touch-icon.png" rel="apple-touch-icon">
    <link href="/apple-touch-icon-precomposed.png" rel="apple-touch-icon-precomposed">
    <link type="image/x-icon" href="/favicon.ico" rel="icon">

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link href="/style.css" rel="stylesheet">
    <script src="/scripts/global.js"></script>
</head>

<body>
    <!--#include virtual="/nav/index.html" -->

    <div class="container-xl mt-3 mb-5 pb-5">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <a class="btn btn-primary" data-bs-toggle='modal' data-bs-target='#clear-starred-modal'>Clear Starred Bonuses</a>
            <div>
                <b>Download this page:</b><a class='ms-2 clickable' id='download-questions-txt'>TXT</a><a class='ms-2 clickable'
                    id='download-questions-csv'>CSV</a><a class='ms-2 clickable' id='download-questions-json'>JSON</a>
            </div>
        </div>
        <div id="bonus-list"></div>
    </div>

    <div class="modal" id="clear-starred-modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Clear Starred Bonuses</h5>
                    <button class="btn-close" data-bs-dismiss="modal" type="button" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Are you sure you want to clear <span id="starred-number"></span> bonuses?
                    This action is irreversible.
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal" type="button">Close</button>
                    <button class="btn btn-primary" id="confirm" type="button">Confirm</button>
                </div>
            </div>
        </div>
    </div>



    <script type="module" src="/user/stars/bonuses.js"></script>
</body>

</html>
