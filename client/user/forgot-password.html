<!doctype html>
<html lang="en">

<head>
    <!--#include virtual="/head.html" -->
    <meta name="description" content="">
</head>

<body>
    <!--#include virtual="/nav/index.html" -->

    <div class="container-xl mt-3 mb-5 pb-5">
        <p class="mt-1 lead">
            To reset your password, enter your username below.
            The email associated with the account, if it exists, will be sent a link to reset the password.
        </p>
        <form class="needs-validation" id="forgot-password-form" novalidate>
            <div class="col-12 mb-3">
                <label class="form-label" for="username">Username</label>
                <input class="form-control" id="username" type="text" name="username" required>
                <div class="invalid-feedback">Enter your username.</div>
            </div>
            <button class="btn btn-primary" id="submission" type="submit">
                Submit
            </button>
        </form>
    </div>



    <script type="module" src="/user/forgot-password.js"></script>
</body>

</html>
