<!doctype html>
<html lang="en">

<head>
    <!--#include virtual="/head.html" -->
    <meta name="description" content="Create a QB Reader account.">
</head>

<body>
    <!--#include virtual="/nav/index.html" -->

    <div class="container-xl mt-3 mb-5 pb-5">
        <form class="needs-validation" id="signup-form" novalidate>
            <p>
                Changing your profile will log you out of your account.
            </p>
            <div class="row mb-3">
                <div class="col-12">
                    <label class="form-label" for="username">Username</label>
                    <input class="form-control" id="username" type="text" name="username" required>
                    <div class="invalid-feedback">Enter your username.</div>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-12">
                    <label class="form-label" for="email">Email</label>
                    <input class="form-control" id="email" type="email" name="email" placeholder="user@example.com" required>
                    <div class="invalid-feedback">Enter a proper email.</div>
                    <div class="form-text">If you change your email, you will have to verify it again.</div>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-12">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-control" id="password" type="password" name="password" value="Uj1v3GAW+5fH" disabled>
                    <div class="form-text">
                        For security reasons, to change your password, click <a href="/user/edit-password">here</a>.
                    </div>
                </div>
            </div>
            <button class="btn btn-primary" id="submission" type="submit">Submit</button>
        </form>
    </div>



    <script type="module" src="/user/edit-profile.js"></script>
</body>

</html>
