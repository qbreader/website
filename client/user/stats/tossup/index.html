<!doctype html>
<html lang="en">

<head>
    <!--#include virtual="/head.html" -->
    <meta name="description" content="">
</head>

<body>
    <!--#include virtual="/nav/index.html" -->

    <div class="container-xl mt-3 mb-5 pb-5">
        <form class="mb-3" id="form">
            <div class="row">
                <div class="col-12 col-md-6 mb-2">
                    <div class="dropdown-checklist btn-group w-100">
                        <button class="btn btn-default text-start w-100" id="dropdownMenu1" data-bs-toggle="dropdown" type="button"
                            aria-expanded="true" aria-haspopup="true">
                            Difficulties
                        </button>
                        <button class="btn btn-default dropdown-toggle dropdown-toggle-split" data-bs-toggle="dropdown"
                            type="button"></button>
                        <ul class="dropdown-menu checkbox-menu allow-focus" id="difficulties" aria-labelledby="dropdownMenu1">
                            <li><label><input type="checkbox" value="1" /> 1: Middle School</label></li>
                            <li><label><input type="checkbox" value="2" /> 2: Easy High School</label></li>
                            <li><label><input type="checkbox" value="3" /> 3: Regular High School</label></li>
                            <li><label><input type="checkbox" value="4" /> 4: Hard High School</label></li>
                            <li><label><input type="checkbox" value="5" /> 5: National High School</label></li>
                            <li><label><input type="checkbox" value="6" /> 6: ● / Easy College</label></li>
                            <li><label><input type="checkbox" value="7" /> 7: ●● / Medium College</label></li>
                            <li><label><input type="checkbox" value="8" /> 8: ●●● / Regionals College</label></li>
                            <li><label><input type="checkbox" value="9" /> 9: ●●●● / Nationals College</label></li>
                            <li><label><input type="checkbox" value="10" /> 10: Open</label></li>
                        </ul>
                    </div>
                </div>
                <div class="input-group col-12 col-md-6 mb-2">
                    <input type="text" class="form-control" id="set-name" placeholder="Set Name" list="set-list" />
                    <datalist id="set-list"></datalist>
                    <button type="submit" class="btn btn-info">Submit</button>
                </div>
            </div>
            <div class="row">
                <div class="col-12 col-md-6">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" role="switch" id="include-multiplayer" checked />
                        <label class="form-check-label" for="include-multiplayer">Include multiplayer stats</label>
                    </div>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" role="switch" id="include-singleplayer" checked />
                        <label class="form-check-label" for="include-singleplayer">Include singleplayer stats</label>
                    </div>
                </div>
                <div class="col-12 col-md-6 text-md-end">
                    <div>
                        <label for="start-date">Start Date (optional):</label>
                        <input type="date" id="start-date" name="start-date">
                    </div>
                    <div>
                        <label for="end-date">End Date (optional):</label>
                        <input type="date" id="end-date" name="end-date">
                    </div>
                </div>
            </div>
        </form>
        <div class="d-flex justify-content-end">
            Download stats:
            <a class='ms-2 clickable' id='download-stats-csv'>CSV</a>
        </div>
        <ul class="nav nav-tabs mb-3" id="stats-tab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="category-tab" data-bs-toggle="tab" data-bs-target="#category-tab-pane"
                    type="button" role="tab" aria-controls="category-tab-pane" aria-selected="true">
                    Category <span class="d-none d-md-inline">Stats</span>
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="subcategory-tab" data-bs-toggle="tab" data-bs-target="#subcategory-tab-pane" type="button"
                    role="tab" aria-controls="subcategory-tab-pane" aria-selected="false">
                    Subcategory <span class="d-none d-md-inline">Stats</span>
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="alternate-subcategory-tab" data-bs-toggle="tab"
                    data-bs-target="#alternate-subcategory-tab-pane" type="button" role="tab"
                    aria-controls="alternate-subcategory-tab-pane" aria-selected="false">
                    Alternate Subcategory <span class="d-none d-md-inline">Stats</span>
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="set-tab" data-bs-toggle="tab" data-bs-target="#set-tab-pane" type="button" role="tab"
                    aria-controls="set-tab-pane" aria-selected="false">
                    Set <span class="d-none d-md-inline">Stats</span>
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="best-buzz-tab" data-bs-toggle="tab" data-bs-target="#best-buzz-tab-pane" type="button"
                    role="tab" aria-controls="best-buzz-tab-pane" aria-selected="false">
                    Best Buzz
                </button>
            </li>
        </ul>
        <div class="tab-content" id="myTabContent">
            <div class="tab-pane table-responsive show active" id="category-tab-pane" role="tabpanel" aria-labelledby="category-tab"
                tabindex="0">
                <table class="table table-hover" id="category-stats">
                    <thead>
                        <tr>
                            <th scope="col">Category</th>
                            <th scope="col">TUH</th>
                            <th scope="col">20</th>
                            <th scope="col">15</th>
                            <th scope="col">10</th>
                            <th scope="col">-5</th>
                            <th scope="col">Celerity</th>
                            <th scope="col">Points</th>
                            <th scope="col">PPTU</th>
                        </tr>
                    </thead>
                    <tbody class="table-group-divider" id="category-stats-body"></tbody>
                    <tfoot class="table-group-divider" id="category-stats-foot"></tfoot>
                </table>
            </div>
            <div class="tab-pane table-responsive" id="subcategory-tab-pane" role="tabpanel" aria-labelledby="subcategory-tab"
                tabindex="0">
                <table class="table table-hover" id="subcategory-stats">
                    <thead>
                        <tr>
                            <th scope="col">Subcategory</th>
                            <th scope="col">TUH</th>
                            <th scope="col">20</th>
                            <th scope="col">15</th>
                            <th scope="col">10</th>
                            <th scope="col">-5</th>
                            <th scope="col">Celerity</th>
                            <th scope="col">Points</th>
                            <th scope="col">PPTU</th>
                        </tr>
                    </thead>
                    <tbody class="table-group-divider" id="subcategory-stats-body"></tbody>
                    <tfoot class="table-group-divider" id="subcategory-stats-foot"></tfoot>
                </table>
            </div>
            <div class="tab-pane table-responsive" id="alternate-subcategory-tab-pane" role="tabpanel"
                aria-labelledby="alternate-subcategory-tab" tabindex="0">
                <table class="table table-hover" id="alternate-subcategory-stats">
                    <thead>
                        <tr>
                            <th scope="col">Alternate Subcategory</th>
                            <th scope="col">TUH</th>
                            <th scope="col">20</th>
                            <th scope="col">15</th>
                            <th scope="col">10</th>
                            <th scope="col">-5</th>
                            <th scope="col">Celerity</th>
                            <th scope="col">Points</th>
                            <th scope="col">PPTU</th>
                        </tr>
                    </thead>
                    <tbody class="table-group-divider" id="alternate-subcategory-stats-body"></tbody>
                    <tfoot class="table-group-divider" id="alternate-subcategory-stats-foot"></tfoot>
                </table>
            </div>
            <div class="tab-pane table-responsive" id="set-tab-pane" role="tabpanel" aria-labelledby="set-tab" tabindex="0">
                <p class="text-muted">Sets with less than 20 tossups heard are excluded for brevity.</p>
                <table class="table table-hover" id="set-stats">
                    <thead>
                        <tr>
                            <th scope="col">Set Name</th>
                            <th scope="col">TUH</th>
                            <th scope="col">20</th>
                            <th scope="col">15</th>
                            <th scope="col">10</th>
                            <th scope="col">-5</th>
                            <th scope="col">Celerity</th>
                            <th scope="col">Points</th>
                            <th scope="col">PPTU</th>
                        </tr>
                    </thead>
                    <tbody class="table-group-divider" id="set-stats-body"></tbody>
                    <tfoot class="table-group-divider" id="set-stats-foot"></tfoot>
                </table>
            </div>
            <div class="tab-pane" id="best-buzz-tab-pane" role="tabpanel" aria-labelledby="best-buzz-tab" tabindex="0">
                <div id="best-buzz"></div>
            </div>
        </div>
    </div>

    <script type="module" src="../script.js"></script>
    <script type="module" src="./index.js"></script>
</body>

</html>
