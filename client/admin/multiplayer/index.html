<!doctype html>
<html lang="en">

<head>
    <title>QB Reader</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Backups for qbreader.">

    <link href="/apple-touch-icon.png" rel="apple-touch-icon">
    <link href="/apple-touch-icon-precomposed.png" rel="apple-touch-icon-precomposed">
    <link type="image/x-icon" href="/favicon.ico" rel="icon">

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link href="/style.css" rel="stylesheet">
    <script src="/scripts/global.js"></script>
</head>

<body>
    <!--#include virtual="/nav/index.html" -->

    <div class="container-xl mt-3 mb-5 pb-5">
        <p class="lead">
            This is the admin portal of QBReader <a href="/play/mp/">multiplayer</a>.
        </p>
        <p>
            There are <span id="active-players"></span> active players in <span id="active-rooms"></span> active rooms.
        </p>
        <ul class="list-group mb-3" id="permanent-room-list"></ul>
        <div class="d-flex justify-content-end mb-3">
            <div class="form-check">
                <input class="form-check-input" id="empty-room-checkbox" type="checkbox">
                <label class="form-check-label" for="empty-room-checkbox">
                    Show empty rooms
                </label>
            </div>
        </div>
        <ul class="list-group mb-5" id="room-list"></ul>
    </div>

    <script type="module" src="./index.js"></script>
</body>

</html>
