<!doctype html>
<html lang="en">

<head>
    <title>QB Reader</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="/apple-touch-icon.png" rel="apple-touch-icon">
    <link href="/apple-touch-icon-precomposed.png" rel="apple-touch-icon-precomposed">
    <link type="image/x-icon" href="/favicon.ico" rel="icon">

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link href="/style.css" rel="stylesheet">
    <script src="/scripts/global.js"></script>
</head>

<body>
    <!--#include virtual="/nav/index.html" -->

    <div class="container-xl mt-3 mb-5 pb-5">
        <p class="text-center lead">
            Manage payments for <span id="packet-name"></span>:
        </p>
        <p class="d-flex justify-content-end">
            <a href="./">Back to admin page</a>
        </p>
        <div>
            <form class="mb-3" id="record-payment-form">
                <div class="mb-3">
                    <label for="username" class="form-label">Manually Record a Payment Below:</label>
                    <input type="text" class="form-control" id="username" placeholder="Enter username" required>
                </div>
                <button type="submit" class="btn btn-primary">Submit</button>
            </form>
            <h3>Payments</h3>
            <p>
                There are <span id="total-payments">0</span> payments recorded for this packet.
                Note: Automatic means the user paid through the website.
                Manual means an admin manually added their payment.
            </p>
            <div class="d-block mx-auto mt-3 spinner-border" id="spinner" role="status">
                <span class="d-none">Loading...</span>
            </div>
            <table class="table table-hover" id="payment-table">
                <thead>
                    <tr>
                        <th scope="col">Username</th>
                        <th scope="col">Date Created</th>
                        <th scope="col">Status</th>
                        <th scope="col">Actions</th>
                    </tr>
                </thead>
                <tbody id="payment-table-body"></tbody>
            </table>
        </div>
    </div>

    <script type="module" src="./manage-payments.js"></script>
</body>

</html>
