<!doctype html>
<html lang="en">

<head>
    <title>QB Reader</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">

    <link href="/apple-touch-icon.png" rel="apple-touch-icon">
    <link href="/apple-touch-icon-precomposed.png" rel="apple-touch-icon-precomposed">
    <link type="image/x-icon" href="/favicon.ico" rel="icon">

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link href="/style.css" rel="stylesheet">
    <script src="/scripts/global.js"></script>
</head>

<body>
    <!--#include virtual="/nav/index.html" -->

    <div class="container-xl mt-3 mb-5 pb-5">
        <div class="d-flex justify-content-end">
            <a href="/admin/">Back to admin page</a>
        </div>
        <form class="needs-validation" id="form" novalidate>
            <div class="mb-3">
                <label for="set-name" class="form-label">Set Name</label>
                <input type="text" class="form-control" id="set-name" list="set-list" required />
                <datalist id="set-list"></datalist>
                <div class="invalid-feedback">Please insert a valid set name.</div>
            </div>
            <div class="mb-3">
                <label for="update-type" class="form-label">Update Type</label>
                <select class="form-select" id="update-type">
                    <option value="name">Change Packet Name</option>
                </select>
            </div>
            <div id="packet-name-div">
                <div class="mb-3">
                    <label for="packet-name" class="form-label">Packet Name</label>
                    <select class="form-select" id="packet-number"></select>
                    <input class="form-check-input" id="packet-number-checkbox" type="checkbox">
                    <label class="form-check-label" for="packet-number-checkbox">Show packet numbers</label>
                </div>
                <div class="mb-3">
                    <label for="new-packet-name" class="form-label">New Packet Name</label>
                    <input type="text" class="form-control" id="new-packet-name" />
                    <div class="invalid-feedback">Please enter a new packet name.</div>
                </div>
            </div>
            <button class="btn btn-primary" id="submit" type="submit">Submit Changes</button>
        </form>
    </div>



    <script type="module" src="./packet.js"></script>
</body>

</html>
