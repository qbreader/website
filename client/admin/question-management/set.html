<!doctype html>
<html lang="en">

<head>
    <!--#include virtual="/head.html" -->
    <meta name="description" content="">
</head>

<body>
    <!--#include virtual="/nav/index.html" -->

    <div class="container-xl mt-3 mb-5 pb-5">
        <div class="d-flex justify-content-end">
            <a href="/admin/">Back to admin page</a>
        </div>
        <form class="needs-validation" id="form" novalidate>
            <div class="mb-3">
                <label for="set-name" class="form-label">Set Name</label>
                <input type="text" class="form-control" id="set-name" list="set-list" required />
                <datalist id="set-list"></datalist>
                <div class="invalid-feedback">
                    Please insert a valid set name.
                </div>
            </div>
            <div class="mb-3">
                <label for="update-type" class="form-label">Update Type</label>
                <select class="form-select" id="update-type">
                    <option value="difficulty">Update Set Difficulty</option>
                    <option value="name">Change Set Name</option>
                    <option value="standard">Update Set Standardness</option>
                </select>
            </div>
            <div class="mb-3" id="difficulty-div">
                <label for="new-set-difficulty" class="form-label">New Set Difficulty</label>
                <input type="number" class="form-control" id="new-set-difficulty" required />
                <div class="invalid-feedback">
                    Please enter a set difficulty between 0-10.
                </div>
            </div>
            <div class="mb-3 d-none" id="name-div">
                <label for="new-set-name" class="form-label">New Set Name</label>
                <input type="text" class="form-control" id="new-set-name" />
                <div class="invalid-feedback">
                    Please enter a new set name. The first four characters must be the year of the set, followed by a space and the
                    rest of the set name.
                </div>
            </div>
            <div class="mb-3 d-none" id="standard-div">
                <label for="new-set-standard" class="form-label">New Set Standardness</label>
                <!-- boolean option -->
                <select class="form-select" id="new-set-standard">
                    <option value="true">Standard</option>
                    <option value="false">Not Standard</option>
                </select>
                <div class="invalid-feedback">
                    Please select whether the set is standard or not.
                </div>
            </div>
            <button class="btn btn-primary" id="submit" type="submit">Submit Changes</button>
        </form>
    </div>



    <script type="module" src="./set.js"></script>
</body>

</html>
